                } else {
                    btn.classList.remove('added');
                    btn.style.removeProperty('--nab-bg');
                    btn.style.removeProperty('--nab-color');
                    btn.style.removeProperty('--nab-border');
                    btn.disabled = false;
                }
            });
        }

        /**
         * Applies or removes the extension colour on the main timer display.
         * Called at the end of every updateTimerDisplay() tick.
         */
        function updateTimerColor() {
            const display = document.getElementById('timerDisplay');
            if (!display) return;
            if (isRunning && zusatzzeitPhase >= 0 && zusatzzeitPhase < zusatzzeiten.length) {
                display.style.color = getZusatzzeitColor(zusatzzeiten[zusatzzeitPhase]).main;
            } else {
                display.style.color = '';
            }
        }

        /**
         * Resets the entire dashboard for a new exam.
         */
        function resetAll() {
            if (!confirm('Möchten Sie wirklich alle Daten (Timer, Aufgaben-Infos, Pausenzeit) zurücksetzen?')) {
                return;
            }
            clearInterval(timerInterval);

            isRunning = false;
            timerMinutes = 30;
            totalSeconds = timerMinutes * 60;
            remainingSeconds = totalSeconds;
            questionInfos = [];
            examEndTimeString = '';
            breakEndTimeManual = '';
            breakEndTimeSetByUser = false;
            totalQuestions = 0;
            zusatzzeiten = [];
            zusatzzeitPhase = -1;

            try {
                localStorage.removeItem('examDashboard');
            } catch (e) {
                console.warn('Could not clear localStorage:', e);
            }

            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('timerDisplay').classList.remove('warning');
            document.getElementById('timerDisplay').style.color = '';
            document.getElementById('examEndTime').textContent = '--:--';
            document.getElementById('breakEndTime').value = '';
            const examEndLabel = document.getElementById('examEndLabel');
            if (examEndLabel) examEndLabel.textContent = 'Ende Prüfung:';

            parseUrlForTimer();

            updateTimerDisplay();
            updateInfoDisplay();
            updateProgressBar();
            updateZusatzzeitDisplay();
        }

        /**
         * Saves the current application state to localStorage.
         */
        function saveToStorage() {
            const data = {
                questionInfos: questionInfos,
                timerMinutes: timerMinutes,
                remainingSeconds: remainingSeconds,
                totalSeconds: totalSeconds,
                isRunning: isRunning,
                breakEndTimeManual: breakEndTimeManual,
                breakEndTimeSetByUser: breakEndTimeSetByUser,
                examEndTimeString: examEndTimeString,
                totalQuestions: totalQuestions,
                zusatzzeiten: zusatzzeiten,
                zusatzzeitPhase: zusatzzeitPhase,
                savedAt: Date.now()
            };
            try {
                localStorage.setItem('examDashboard', JSON.stringify(data));
            } catch (e) {
                console.warn('Could not save to localStorage:', e);
            }
        }

        /**
         * Loads the application state from localStorage.
         * Prioritizes URL hash for initial timer setting if present.
         */
        function loadFromStorage() {
            let data;
            try {
                const stored = localStorage.getItem('examDashboard');
                if (stored) data = JSON.parse(stored);
            } catch (e) {
                console.warn('Could not load from localStorage:', e);
                return;
            }
            if (!data) return;

            questionInfos = data.questionInfos || [];
            
            // Only use stored totalQuestions if no URL parameter is set
            const urlParams = new URLSearchParams(window.location.search);
            const urlQuestionsSet = urlParams.has('q') || window.location.hash.indexOf('q=') !== -1;
            if (!urlQuestionsSet) {
                totalQuestions = data.totalQuestions || 0;
            }

            const urlTimerSet = urlParams.has('t') || window.location.hash.indexOf('t=') !== -1;
            if (!urlTimerSet || data.isRunning) {
                timerMinutes = data.timerMinutes !== undefined ? data.timerMinutes : 30;
                totalSeconds = data.totalSeconds !== undefined ? data.totalSeconds : timerMinutes * 60;
                remainingSeconds = data.remainingSeconds !== undefined ? data.remainingSeconds : timerMinutes * 60;
                isRunning = data.isRunning || false;

                // If timer was running when saved, subtract elapsed time since save
                if (isRunning && data.savedAt) {
                    const elapsedSinceSave = Math.floor((Date.now() - data.savedAt) / 1000);
                    remainingSeconds = Math.max(0, remainingSeconds - elapsedSinceSave);
                }
            }

            breakEndTimeManual = data.breakEndTimeManual || '';
            breakEndTimeSetByUser = data.breakEndTimeSetByUser || false;
            examEndTimeString = data.examEndTimeString || '';
            zusatzzeiten    = Array.isArray(data.zusatzzeiten) ? data.zusatzzeiten : [];
            zusatzzeitPhase = typeof data.zusatzzeitPhase === 'number' ? data.zusatzzeitPhase : -1;

            document.getElementById('breakEndTime').value = breakEndTimeManual;
            document.getElementById('examEndTime').textContent = examEndTimeString || '--:--';

            if (isRunning) {
                if (remainingSeconds <= 0) {
                    timerEnded();
                } else {
                    startTimer(true);
                }
            } else {
                updateTimerDisplay();
            }
            updateZusatzzeitDisplay();
        }

        /**
         * Exports the current application data as a JSON file.
         */
        function exportData() {
            const data = {
                questionInfos: questionInfos,
                timerMinutes: timerMinutes,
                remainingSeconds: remainingSeconds,
                totalSeconds: totalSeconds,
                isRunning: isRunning,
                breakEndTimeManual: breakEndTimeManual,
                examEndTimeString: examEndTimeString,
                totalQuestions: totalQuestions,
                zusatzzeiten: zusatzzeiten,
                zusatzzeitPhase: zusatzzeitPhase,
                exportDate: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `exam-dashboard-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        /**
         * Imports data from a selected JSON file, updating the dashboard state.
         */
        function importData(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.questionInfos) {
                            questionInfos = data.questionInfos;
                        }

                        if (data.timerMinutes !== undefined) {
                            timerMinutes = data.timerMinutes;
                            totalSeconds = data.totalSeconds !== undefined ? data.totalSeconds : data.timerMinutes * 60;
                            remainingSeconds = data.remainingSeconds !== undefined ? data.remainingSeconds : data.timerMinutes * 60;
                            isRunning = data.isRunning || false;
                            breakEndTimeManual = data.breakEndTimeManual || '';
                            examEndTimeString = data.examEndTimeString || '';
                            totalQuestions = data.totalQuestions || 0;

                            document.getElementById('breakEndTime').value = breakEndTimeManual;
                            document.getElementById('examEndTime').textContent = examEndTimeString || '--:--';

                            zusatzzeiten    = Array.isArray(data.zusatzzeiten) ? data.zusatzzeiten : [];
                            zusatzzeitPhase = typeof data.zusatzzeitPhase === 'number' ? data.zusatzzeitPhase : -1;

                            clearInterval(timerInterval);

                            if (isRunning) {
                                startTimer();
                            } else {
                                updateTimerDisplay();
                                document.getElementById('startBtn').style.display = 'inline-block';
                            }
                        }
                        saveToStorage();
                        updateInfoDisplay(); // Refresh info display (calls font size adjustment)
                        updateZusatzzeitDisplay();
                        showMessage('Import Erfolgreich', 'Die Daten wurden erfolgreich importiert.');
                    } catch (error) {
                        showMessage('Import Fehler', 'Fehler beim Importieren der Datei: ' + error.message);
                    }
                };
                reader.readAsText(file);
            }
            // Reset so selecting the same file again still triggers change
            event.target.value = '';
        }

        document.getElementById('questionText').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { // Allow Shift+Enter for new lines in textarea
                e.preventDefault(); // Prevent default new line behavior for Enter
                addQuestionInfo();
            }
        });

        window.addEventListener('load', init);

        function showMessage(title, message) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('customModal').style.display = 'flex';
        }

        function hideMessage() {
            document.getElementById('customModal').style.display = 'none';
        }

        function showChecklist() {
            document.getElementById('checklistModal').style.display = 'flex';
            const el = document.documentElement;
            
            // Request fullscreen for the checklist modal
            if (!document.fullscreenElement) {
                const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (req) {
                    const result = req.call(el);
                    if (result && typeof result.catch === 'function') result.catch(() => {});
                }
            }
            
            // Add Enter key listener to checkboxes
            addChecklistCheckboxListeners();
        }

        function hideChecklist() {
            document.getElementById('checklistModal').style.display = 'none';
        }
        
        function addChecklistCheckboxListeners() {
            const checkboxes = document.querySelectorAll('#checklistModal .checklist-checkbox');
            checkboxes.forEach((checkbox, index) => {
                // Remove any existing listeners to avoid duplicates
                checkbox.removeEventListener('keypress', handleChecklistCheckboxEnter);
                checkbox.addEventListener('keypress', (e) => handleChecklistCheckboxEnter(e, index));
            });
            
            // Focus the first checkbox when the checklist opens
            if (checkboxes.length > 0) {
                checkboxes[0].focus();
            }
        }
        
        function handleChecklistCheckboxEnter(e, currentIndex) {
            if (e.key === 'Enter') {
                e.preventDefault();
                // Toggle the checkbox state using e.target
                e.target.checked = !e.target.checked;
                
                // Move focus to the next checkbox or to close button if last item
                const checkboxes = document.querySelectorAll('#checklistModal .checklist-checkbox');
                const nextIndex = currentIndex + 1;
                
                if (nextIndex < checkboxes.length) {
                    checkboxes[nextIndex].focus();
                } else {
                    // Focus on the close button after the last checkbox
                    const closeBtn = document.querySelector('#checklistModal .btn-primary');
                    if (closeBtn) {
                        closeBtn.focus();
                    }
                }
            }
        }

        /**
         * Toggles teacher-mode on the body. In student mode all teacher-only
         * controls are hidden; only the small toggle button in the bottom
         * right corner stays visible. Also flips contenteditable on the
         * timer and the question-count span so students can't tamper with
         * them via direct click/tab focus. Layout is re-measured because
         * hiding/showing the input row changes available height.
         */
        function toggleTeacherMode() {
            const wasTeacher = document.body.classList.contains('teacher-mode');
            document.body.classList.toggle('teacher-mode');
            const isTeacher = document.body.classList.contains('teacher-mode');
            const timerDisplay = document.getElementById('timerDisplay');
            const totalEl = document.getElementById('progressTotal');
            if (timerDisplay) timerDisplay.setAttribute('contenteditable', isTeacher ? 'true' : 'false');
            if (totalEl) totalEl.setAttribute('contenteditable', isTeacher ? 'true' : 'false');
            // Teacher engaged — no further need to nudge.
            const teacherBtn = document.getElementById('teacherToggleBtn');
            if (teacherBtn) teacherBtn.classList.remove('nudge');
            adjustLayout();

            // Leaving teacher mode = the classroom view takes over. Request
            // fullscreen so the dashboard fills the smartboard. We don't
            // auto-exit when re-entering — the teacher can press Esc.
            if (wasTeacher && !isTeacher && !document.fullscreenElement) {
                const el = document.documentElement;
                const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (req) {
                    const result = req.call(el);
                    if (result && typeof result.catch === 'function') result.catch(() => {});
                }
            }
        }
    </script>
</body>

</html>
