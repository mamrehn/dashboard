        /**
         * Adjusts the height of the info-display to fit available screen space.
         */
        function adjustInfoDisplayHeight() {
            const dateInfo = document.querySelector('.date-info');
            const timerSection = document.querySelector('.timer-section');
            const additionalInfo = document.querySelector('.additional-info');
            const infoInput = document.querySelector('.info-input');
            const container = document.querySelector('.container');

            const dateInfoHeight = dateInfo ? dateInfo.offsetHeight : 0;
            const timerSectionHeight = timerSection ? timerSection.offsetHeight : 0;
            const infoInputHeight = infoInput ? infoInput.offsetHeight : 0;

            const bodyStyle = getComputedStyle(document.body);
            const containerStyle = getComputedStyle(container);

            const bodyPaddingTop = parseFloat(bodyStyle.paddingTop);
            const bodyPaddingBottom = parseFloat(bodyStyle.paddingBottom);
            const containerPaddingTop = parseFloat(containerStyle.paddingTop);
            const containerPaddingBottom = parseFloat(containerStyle.paddingBottom);

            const containerGap = parseFloat(containerStyle.gap) || 12;
            const gridGaps = containerGap * 2;

            const totalFixedHeight = dateInfoHeight + timerSectionHeight + infoInputHeight +
                bodyPaddingTop + bodyPaddingBottom +
                containerPaddingTop + containerPaddingBottom +
                gridGaps;

            let availableHeight = window.innerHeight - totalFixedHeight;

            // Ensure a minimum height for usability (e.g., 100px)
            if (availableHeight < 100) {
                availableHeight = 100;
            }

            // Apply height to the info-display (the scrollable content area)
            document.getElementById('infoDisplay').style.height = `${availableHeight}px`;
        }

        /**
         * Dynamically adjusts the font size of content within info-display to fit.
         */
        function adjustInfoDisplayFontSize() {
            const infoDisplay = document.getElementById('infoDisplay');
            const infoItems = infoDisplay.querySelectorAll('.info-item');
            if (infoItems.length === 0) return;

            // Create a temporary div to measure content without affecting the visible layout
            const tempDiv = document.createElement('div');
            tempDiv.style.visibility = 'hidden';
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.top = '-9999px';
            tempDiv.style.width = infoDisplay.clientWidth + 'px'; // Match width for accurate text wrapping
            tempDiv.style.height = 'auto'; // Auto height for content measurement
            tempDiv.style.overflow = 'hidden';
            document.body.appendChild(tempDiv);

            let minFontSize = 1; // Minimum readable font size
            let maxFontSize = 40; // Maximum desired font size for info-text
            let bestFitSize = minFontSize;

            let low = minFontSize;
            let high = maxFontSize;

            // Binary search to find the largest font size that fits
            while (low <= high) {
                let mid = Math.floor((low + high) / 2) | 0;

                tempDiv.innerHTML = ''; // Clear content for new measurement
                infoItems.forEach(item => {
                    const clonedItem = item.cloneNode(true);
                    // Apply trial font sizes (null-safe: editing items have no .info-question/.info-text)
                    const q = clonedItem.querySelector('.info-question');
                    const t = clonedItem.querySelector('.info-text');
                    if (q) q.style.fontSize = `${mid}px`;
                    if (t) t.style.fontSize = `${mid}px`;
                    tempDiv.appendChild(clonedItem);
                });

                // Check if the content fits within the infoDisplay's clientHeight
                // clientHeight is the inner height of the element, excluding padding and border
                if (tempDiv.scrollHeight <= infoDisplay.clientHeight) {
                    bestFitSize = mid; // This size fits, try a larger one
                    low = mid + 1;
                } else {
                    high = mid - 1; // This size overflows, try a smaller one
                }
            }

            // Apply the best fit font size to the actual elements
            infoItems.forEach(item => {
                const q = item.querySelector('.info-question');
                const t = item.querySelector('.info-text');
                if (q) q.style.fontSize = `${bestFitSize}px`;
                if (t) t.style.fontSize = `${bestFitSize}px`;
            });

            document.body.removeChild(tempDiv); // Clean up the temporary div
        }


        /**
         * Sets the total question count and updates the progress bar.
         */
        function setQuestionCount(value) {
            totalQuestions = Math.max(0, Math.min(200, parseInt(value) || 0));
            updateProgressBar();
            saveToStorage();
        }

        /**
         * Updates the tiled progress bar based on elapsed time and total questions.
         */
        function updateProgressBar() {
            const container = document.getElementById('progressBarContainer');
            const bar = document.getElementById('progressBar');
            const label = document.getElementById('progressLabel');

            container.style.display = 'flex';

            let expectedQuestion = 0;
            if (isRunning && totalSeconds > 0 && totalQuestions > 0) {
                let elapsedSeconds, effectiveTotalSeconds;
                if (zusatzzeitPhase >= 0 && zusatzzeitPhase < zusatzzeiten.length) {
                    // During an extension phase: scale progress to that group's full duration.
                    // effectiveTotalSeconds = base + current extension %.
                    // remainingSeconds counts down only the incremental extension slice,
                    // so elapsed = effectiveTotal - remaining gives the correct overall position.
                    const currentPct = zusatzzeiten[zusatzzeitPhase];
                    effectiveTotalSeconds = Math.round(timerMinutes * 60 * (1 + currentPct / 100));
                    elapsedSeconds = effectiveTotalSeconds - remainingSeconds;
                } else {
                    effectiveTotalSeconds = totalSeconds;
                    elapsedSeconds = totalSeconds - remainingSeconds;
                }
                expectedQuestion = Math.ceil((elapsedSeconds / effectiveTotalSeconds) * totalQuestions);
                expectedQuestion = Math.max(1, Math.min(totalQuestions, expectedQuestion));
                if (elapsedSeconds === 0) expectedQuestion = 1;
            }

            // Build label structure once; on subsequent ticks reuse existing
            // nodes so the editable #progressTotal keeps focus/caret while the
            // user is editing, and the pulse animation on current tile isn't
            // restarted every second.
            let totalEl = document.getElementById('progressTotal');
            if (!totalEl) {
                label.innerHTML = '<span id="progressPrefix"></span><span class="progress-total" contenteditable="true" id="progressTotal"></span><span id="progressSuffix"></span>';
                totalEl = document.getElementById('progressTotal');
                totalEl.addEventListener('blur', function () {
                    const newVal = parseInt(this.textContent) || 0;
                    if (newVal !== totalQuestions) {
                        setQuestionCount(newVal);
                    } else {
                        this.textContent = totalQuestions;
                    }
                });
                // Keep the span's height stable when cleared — see same
                // treatment on #timerDisplay.
                totalEl.addEventListener('input', function () {
                    if (this.innerHTML === '<br>' || this.innerHTML === '<br/>') {
                        this.innerHTML = '';
                    }
                });
                totalEl.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.blur();
                    }
                });
            }

            const prefix = document.getElementById('progressPrefix');
            const suffix = document.getElementById('progressSuffix');
            if (isRunning) {
                prefix.textContent = `Aufgabe ${expectedQuestion} / `;
                suffix.textContent = '';
            } else {
                prefix.textContent = '';
                suffix.textContent = ' Aufgaben';
            }
            if (document.activeElement !== totalEl) {
                totalEl.textContent = totalQuestions;
            }

            // Reuse existing tile nodes when the count hasn't changed; only
            // update classes. This keeps the .current pulse animation smooth.
            let tiles = bar.children;
            if (tiles.length !== totalQuestions) {
                bar.innerHTML = '';
                for (let i = 0; i < totalQuestions; i++) {
                    const tile = document.createElement('div');
                    tile.className = 'progress-tile';
                    bar.appendChild(tile);
                }
                tiles = bar.children;
            }

            for (let i = 0; i < tiles.length; i++) {
                const tile = tiles[i];
                const q = i + 1;
                let cls = 'progress-tile';
                if (isRunning) {
                    if (q < expectedQuestion) {
                        cls += ' completed';
                    } else if (q === expectedQuestion) {
                        cls += remainingSeconds === 0 ? ' completed' : ' current';
                    }
                }
                if (tile.className !== cls) tile.className = cls;
            }
        }

        /**
         * Deletes a question info item by index.
         */
        function deleteQuestionInfo(index) {
            if (index >= 0 && index < questionInfos.length) {
                questionInfos.splice(index, 1);
                updateInfoDisplay();
                saveToStorage();
            }
        }

        /**
         * Toggles a Nachteilsausgleich percentage on/off.
         * Active or already-completed phases are locked.
         * When a toggle occurs mid-exam, the auto-suggested break end is
         * re-derived so it always sits 5 min after the longest group finishes.
         */
        function toggleZusatzzeit(pct) {
            const idx = zusatzzeiten.indexOf(pct);
            if (idx !== -1) {
                if (zusatzzeitPhase >= 0 && idx <= zusatzzeitPhase) return;
                zusatzzeiten.splice(idx, 1);
            } else {
                zusatzzeiten.push(pct);
                zusatzzeiten.sort((a, b) => a - b);
            }
            updateZusatzzeitDisplay();
            // Re-run end-time calc so the auto-suggested break end reflects the
            // (possibly) new longest extension. No-op when the teacher has set
            // the break end manually — updateEndTimes() guards on that flag.
            if (isRunning) updateEndTimes();
            saveToStorage();
        }

        /**
         * Renders the unified Nachteilsausgleich pill row.
         * One pill per supported percentage; the visual state (available /
         * pending / active / past) tells the rest of the story.
         */
        function updateZusatzzeitDisplay() {
            const row = document.getElementById('zusatzzeitRow');
            const pills = document.getElementById('zusatzzeitPills');
            if (!row || !pills) return;

            // Student view collapses the whole row when nothing is scheduled
            // so the dashboard stays calm for regular exams. Teacher always
            // sees the row as an entry point.
            const isTeacher = document.body.classList.contains('teacher-mode');
            const hasAny = zusatzzeiten.length > 0;
            row.style.display = (!isTeacher && !hasAny) ? 'none' : 'flex';

            pills.innerHTML = ZUSATZZEIT_VALUES.map(pct => {
                const c = getZusatzzeitColor(pct);
                const extraMin = Math.round(timerMinutes * pct / 100);
                const idx = zusatzzeiten.indexOf(pct);
                const isAdded   = idx !== -1;
                const isActive  = isAdded && isRunning && idx === zusatzzeitPhase;
                const isPast    = isAdded && zusatzzeitPhase >= 0 && idx < zusatzzeitPhase;
                const isPending = isAdded && !isActive && !isPast;

                let state, aria;
                if (isActive)       { state = 'active';    aria = `+${pct}% Nachteilsausgleich, ${extraMin} Minuten, läuft jetzt`; }
                else if (isPast)    { state = 'past';      aria = `+${pct}% Nachteilsausgleich, ${extraMin} Minuten, beendet`; }
                else if (isPending) { state = 'pending';   aria = `+${pct}% Nachteilsausgleich, ${extraMin} Minuten, eingeplant. Klicken zum Entfernen.`; }
                else                { state = 'available'; aria = `+${pct}% Nachteilsausgleich, ${extraMin} Minuten. Klicken zum Hinzufügen.`; }

                const clickable = state === 'available' || state === 'pending';
                const styleVars = `--nab-color:${c.main};--nab-bg:${c.light};--nab-border:${c.border};`;
                const removeHint = (state === 'pending')
                    ? `<span class="zusatzzeit-pill-remove" aria-hidden="true"><i class="bi bi-x"></i></span>`
                    : '';

                return `<button type="button"
                                class="zusatzzeit-pill ${state}"
                                style="${styleVars}"
                                ${clickable ? `onclick="toggleZusatzzeit(${pct})"` : 'disabled'}
                                aria-label="${aria}"
                                aria-pressed="${isAdded}">
                            <span class="pct">+${pct} %</span>
                            <span class="min">${extraMin} min</span>
                            ${removeHint}
                        </button>`;
            }).join('');
        }

        /**
         * Paints the timer number, unit, and label in the active extension's
         * colour so "Restzeit 10 min" reads as one coloured unit. Inline
         * colour is cleared during the main exam so CSS defaults win naturally.
         */
        function updateTimerColor() {
            const display = document.getElementById('timerDisplay');
            const unit    = document.getElementById('timerUnit');
            const label   = document.querySelector('.timer-number-wrap .timer-label');
            if (!display) return;

            const inExtension = isRunning && zusatzzeitPhase >= 0 && zusatzzeitPhase < zusatzzeiten.length;
            const color = inExtension ? getZusatzzeitColor(zusatzzeiten[zusatzzeitPhase]).main : '';

            display.style.color = color;
            if (unit)  unit.style.color  = color;
            if (label) label.style.color = color;
        }

        /**
         * Resets the entire dashboard for a new exam.
         */
        function resetAll() {
            if (!confirm('Möchten Sie wirklich alle Daten (Timer, Aufgaben-Infos, Pausenzeit) zurücksetzen?')) {
                return;
            }
            clearInterval(timerInterval);

            isRunning = false;
            timerMinutes = 30;
            totalSeconds = timerMinutes * 60;
            remainingSeconds = totalSeconds;
            questionInfos = [];
            examEndTimeString = '';
            breakEndTimeManual = '';
            breakEndTimeSetByUser = false;
            totalQuestions = 0;
            zusatzzeiten = [];
            zusatzzeitPhase = -1;
            teacherModeToggled = false;
            editingInfoIndex = null;

            try {
                localStorage.removeItem('examDashboard');
            } catch (e) {
                console.warn('Could not clear localStorage:', e);
            }

            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('timerDisplay').classList.remove('warning');
            updateTimerColor(); // clears inline colour on number + unit + label
            document.getElementById('examEndTime').textContent = '--:--';
            document.getElementById('breakEndTime').value = '';
            const examEndLabel = document.getElementById('examEndLabel');
            if (examEndLabel) examEndLabel.textContent = 'Ende Prüfung:';

            parseUrlForTimer();

            updateTimerDisplay();
            updateInfoDisplay();
            updateProgressBar();
            updateZusatzzeitDisplay();
        }

        /**
         * Saves the current application state to localStorage.
         */
        function saveToStorage() {
            const data = {
                questionInfos: questionInfos,
                timerMinutes: timerMinutes,
                remainingSeconds: remainingSeconds,
                totalSeconds: totalSeconds,
                isRunning: isRunning,
                breakEndTimeManual: breakEndTimeManual,
                breakEndTimeSetByUser: breakEndTimeSetByUser,
                examEndTimeString: examEndTimeString,
                totalQuestions: totalQuestions,
                zusatzzeiten: zusatzzeiten,
                zusatzzeitPhase: zusatzzeitPhase,
                teacherModeToggled: teacherModeToggled,
                savedAt: Date.now()
            };
            try {
                localStorage.setItem('examDashboard', JSON.stringify(data));
            } catch (e) {
                console.warn('Could not save to localStorage:', e);
            }
        }

        /**
         * Loads the application state from localStorage.
         * Prioritizes URL hash for initial timer setting if present.
         */
        function loadFromStorage() {
            let data;
            try {
                const stored = localStorage.getItem('examDashboard');
                if (stored) data = JSON.parse(stored);
            } catch (e) {
                console.warn('Could not load from localStorage:', e);
                return;
            }
            if (!data) return;

            questionInfos = data.questionInfos || [];
            
            // Only use stored totalQuestions if no URL parameter is set
            const urlParams = new URLSearchParams(window.location.search);
            const urlQuestionsSet = urlParams.has('q') || window.location.hash.indexOf('q=') !== -1;
            if (!urlQuestionsSet) {
                totalQuestions = data.totalQuestions || 0;
            }

            const urlTimerSet = urlParams.has('t') || window.location.hash.indexOf('t=') !== -1;
            if (!urlTimerSet || data.isRunning) {
                timerMinutes = data.timerMinutes !== undefined ? data.timerMinutes : 30;
                totalSeconds = data.totalSeconds !== undefined ? data.totalSeconds : timerMinutes * 60;
                remainingSeconds = data.remainingSeconds !== undefined ? data.remainingSeconds : timerMinutes * 60;
                isRunning = data.isRunning || false;

                // If timer was running when saved, subtract elapsed time since save
                if (isRunning && data.savedAt) {
                    const elapsedSinceSave = Math.floor((Date.now() - data.savedAt) / 1000);
                    remainingSeconds = Math.max(0, remainingSeconds - elapsedSinceSave);
                }
            }

            breakEndTimeManual = data.breakEndTimeManual || '';
            breakEndTimeSetByUser = data.breakEndTimeSetByUser || false;
            examEndTimeString = data.examEndTimeString || '';
            zusatzzeiten    = Array.isArray(data.zusatzzeiten) ? data.zusatzzeiten : [];
            zusatzzeitPhase = typeof data.zusatzzeitPhase === 'number' ? data.zusatzzeitPhase : -1;
            teacherModeToggled = data.teacherModeToggled || false;

            document.getElementById('breakEndTime').value = breakEndTimeManual;
            document.getElementById('examEndTime').textContent = examEndTimeString || '--:--';

            if (isRunning) {
                if (remainingSeconds <= 0) {
                    timerEnded();
                } else {
                    startTimer(true);
                }
            } else {
                updateTimerDisplay();
            }
            updateZusatzzeitDisplay();
        }

        /**
         * Exports the current application data as a JSON file.
         */
        function exportData() {
            const data = {
                questionInfos: questionInfos,
                timerMinutes: timerMinutes,
                remainingSeconds: remainingSeconds,
                totalSeconds: totalSeconds,
                isRunning: isRunning,
                breakEndTimeManual: breakEndTimeManual,
                examEndTimeString: examEndTimeString,
                totalQuestions: totalQuestions,
                zusatzzeiten: zusatzzeiten,
                zusatzzeitPhase: zusatzzeitPhase,
                exportDate: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `exam-dashboard-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        /**
         * Imports data from a selected JSON file, updating the dashboard state.
         */
        function importData(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.questionInfos) {
                            questionInfos = data.questionInfos;
                        }

                        if (data.timerMinutes !== undefined) {
                            timerMinutes = data.timerMinutes;
                            totalSeconds = data.totalSeconds !== undefined ? data.totalSeconds : data.timerMinutes * 60;
                            remainingSeconds = data.remainingSeconds !== undefined ? data.remainingSeconds : data.timerMinutes * 60;
                            isRunning = data.isRunning || false;
                            breakEndTimeManual = data.breakEndTimeManual || '';
                            examEndTimeString = data.examEndTimeString || '';
                            totalQuestions = data.totalQuestions || 0;

                            document.getElementById('breakEndTime').value = breakEndTimeManual;
                            document.getElementById('examEndTime').textContent = examEndTimeString || '--:--';

                            zusatzzeiten    = Array.isArray(data.zusatzzeiten) ? data.zusatzzeiten : [];
                            zusatzzeitPhase = typeof data.zusatzzeitPhase === 'number' ? data.zusatzzeitPhase : -1;

                            clearInterval(timerInterval);

                            if (isRunning) {
                                startTimer();
                            } else {
                                updateTimerDisplay();
                                document.getElementById('startBtn').style.display = 'inline-block';
                            }
                        }
                        saveToStorage();
                        updateInfoDisplay(); // Refresh info display (calls font size adjustment)
                        updateZusatzzeitDisplay();
                        showMessage('Import Erfolgreich', 'Die Daten wurden erfolgreich importiert.');
                    } catch (error) {
                        showMessage('Import Fehler', 'Fehler beim Importieren der Datei: ' + error.message);
                    }
                };
                reader.readAsText(file);
            }
            // Reset so selecting the same file again still triggers change
            event.target.value = '';
        }

        document.getElementById('questionText').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { // Allow Shift+Enter for new lines in textarea
                e.preventDefault(); // Prevent default new line behavior for Enter
                addQuestionInfo();
            }
        });

        window.addEventListener('load', init);

        function startEditInfo(index) {
            editingInfoIndex = index;
            updateInfoDisplay();
            // Focus the number field so the teacher can edit immediately
            setTimeout(() => {
                const el = document.getElementById(`editNumber_${index}`);
                if (el) el.focus();
            }, 0);
        }

        function saveEditInfo(index) {
            const numberEl = document.getElementById(`editNumber_${index}`);
            const textEl   = document.getElementById(`editText_${index}`);
            if (!numberEl || !textEl) return;
            const newNumber = numberEl.value.trim();
            const newText   = textEl.value.trim();
            if (newNumber && newText) {
                questionInfos[index] = { number: newNumber, text: newText };
                questionInfos.sort((a, b) => {
                    const aNum = parseFloat(a.number.replace(/[^\d.]/g, '')) || 0;
                    const bNum = parseFloat(b.number.replace(/[^\d.]/g, '')) || 0;
                    return aNum - bNum;
                });
            }
            editingInfoIndex = null;
            updateInfoDisplay();
            saveToStorage();
            if (teacherModeToggled && document.body.classList.contains('teacher-mode')) {
                toggleTeacherMode();
            }
        }

        function cancelEditInfo() {
            editingInfoIndex = null;
            updateInfoDisplay();
        }

        /**
         * Adds or removes deltaMins minutes from the running exam timer.
         * Cascades to: remaining time display, exam end time, break end
         * (if not manually set), Nachteilsausgleich pill labels, progress bar.
         */
        function adjustTime(deltaMins) {
            if (!isRunning) return;
            const deltaSeconds = deltaMins * 60;
            timerMinutes     = Math.max(1, timerMinutes + deltaMins);
            remainingSeconds = Math.max(0, remainingSeconds + deltaSeconds);
            totalSeconds     = Math.max(60, totalSeconds + deltaSeconds);

            updateTimerDisplay();
            updateProgressBar();
            updateZusatzzeitDisplay(); // extension pill labels derive from timerMinutes
            updateEndTimes();
            saveToStorage();

            // Brief flash on the timer digits to confirm the adjustment
            const display = document.getElementById('timerDisplay');
            if (display) {
                display.classList.remove('time-flash');
                void display.offsetWidth; // force reflow to restart animation
                display.classList.add('time-flash');
                setTimeout(() => display.classList.remove('time-flash'), 350);
            }
        }

        /** Shows/hides the time-adjust button stack based on mode and running state. */
        function updateTimeAdjustButtons() {
            const el = document.getElementById('timeAdjustButtons');
            if (!el) return;
            const isTeacher = document.body.classList.contains('teacher-mode');
            el.style.display = (isTeacher && isRunning) ? 'flex' : 'none';
        }

        /**
         * Aligns the time-adjust button stack with the timer display element:
         * sets top to match the timer's viewport position and sizes each button
         * so both together equal the timer's rendered height.
         */
        function repositionTimeAdjustButtons() {
            const buttons = document.getElementById('timeAdjustButtons');
            const timerDisplay = document.getElementById('timerDisplay');
            if (!buttons || !timerDisplay) return;
            const rect = timerDisplay.getBoundingClientRect();
            if (rect.height === 0) return;
            const gap = 3; // matches CSS gap: 3px
            const btnHeight = Math.floor((rect.height - gap) / 2);
            buttons.style.top = `${rect.top}px`;
            buttons.querySelectorAll('.time-adjust-btn').forEach(btn => {
                btn.style.height = `${btnHeight}px`;
            });
        }

        function showMessage(title, message) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('customModal').style.display = 'flex';
        }

        function hideMessage() {
            document.getElementById('customModal').style.display = 'none';
        }

        function showChecklist() {
            document.getElementById('checklistModal').style.display = 'flex';
            const el = document.documentElement;
            
            // Request fullscreen for the checklist modal
            if (!document.fullscreenElement) {
                const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (req) {
                    const result = req.call(el);
                    if (result && typeof result.catch === 'function') result.catch(() => {});
                }
            }
            
            // Add Enter key listener to checkboxes
            addChecklistCheckboxListeners();
        }

        function hideChecklist() {
            document.getElementById('checklistModal').style.display = 'none';
        }
        
        function addChecklistCheckboxListeners() {
            const checkboxes = document.querySelectorAll('#checklistModal .checklist-checkbox');
            checkboxes.forEach((checkbox, index) => {
                // Remove any existing listeners to avoid duplicates
                checkbox.removeEventListener('keypress', handleChecklistCheckboxEnter);
                checkbox.addEventListener('keypress', (e) => handleChecklistCheckboxEnter(e, index));
            });
            
            // Focus the first checkbox when the checklist opens
            if (checkboxes.length > 0) {
                checkboxes[0].focus();
            }
        }
        
        function handleChecklistCheckboxEnter(e, currentIndex) {
            if (e.key === 'Enter') {
                e.preventDefault();
                // Toggle the checkbox state using e.target
                e.target.checked = !e.target.checked;
                
                // Move focus to the next checkbox or to close button if last item
                const checkboxes = document.querySelectorAll('#checklistModal .checklist-checkbox');
                const nextIndex = currentIndex + 1;
                
                if (nextIndex < checkboxes.length) {
                    checkboxes[nextIndex].focus();
                } else {
                    // Focus on the close button after the last checkbox
                    const closeBtn = document.querySelector('#checklistModal .btn-primary');
                    if (closeBtn) {
                        closeBtn.focus();
                    }
                }
            }
        }

        /**
         * Toggles teacher-mode on the body. In student mode all teacher-only
         * controls are hidden; only the small toggle button in the bottom
         * right corner stays visible. Also flips contenteditable on the
         * timer and the question-count span so students can't tamper with
         * them via direct click/tab focus. Layout is re-measured because
         * hiding/showing the input row changes available height.
         */
        function toggleTeacherMode() {
            teacherModeToggled = true;
            const wasTeacher = document.body.classList.contains('teacher-mode');
            document.body.classList.toggle('teacher-mode');
            const isTeacher = document.body.classList.contains('teacher-mode');

            // Cancel any in-progress inline edit when leaving teacher mode
            if (!isTeacher && editingInfoIndex !== null) {
                editingInfoIndex = null;
            }

            const timerDisplay = document.getElementById('timerDisplay');
            const totalEl = document.getElementById('progressTotal');
            if (timerDisplay) timerDisplay.setAttribute('contenteditable', isTeacher ? 'true' : 'false');
            if (totalEl) totalEl.setAttribute('contenteditable', isTeacher ? 'true' : 'false');
            // Teacher engaged — no further need to nudge.
            const teacherBtn = document.getElementById('teacherToggleBtn');
            if (teacherBtn) teacherBtn.classList.remove('nudge');
            // Re-render the pill row so the row hides in student view when no
            // extension is scheduled, and re-appears for teachers.
            updateZusatzzeitDisplay();
            updateInfoDisplay(); // refresh edit-btn visibility
            updateTimeAdjustButtons();
            adjustLayout();

            // Leaving teacher mode = the classroom view takes over. Request
            // fullscreen so the dashboard fills the smartboard. We don't
            // auto-exit when re-entering — the teacher can press Esc.
            if (wasTeacher && !isTeacher && !document.fullscreenElement) {
                const el = document.documentElement;
                const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (req) {
                    const result = req.call(el);
                    if (result && typeof result.catch === 'function') result.catch(() => {});
                }
            }
        }
    </script>
